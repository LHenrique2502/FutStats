name: FutStats Daily Cron

on:
  schedule:
    - cron: "0 6 * * *" # 03:00 no Brasil
  workflow_dispatch:

concurrency:
  group: rotina-diaria
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-routine:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd futstats
          pip install -r requirements.txt

      - name: Run routine
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          THESPORTSDB_API_KEY: ${{ secrets.THESPORTSDB_API_KEY }}
          THESPORTSDB_BASE_URL: ${{ secrets.THESPORTSDB_BASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          cd futstats
          python manage.py rotina_diaria || echo "⚠️ Rotina diária teve erros, mas continuando..."
          python manage.py importar_odds --days 3 || echo "⚠️ Importação de odds teve erros"
          python manage.py precomputar_analises --days-ahead 3 --sample-limit 5 --force || echo "⚠️ Pré-cálculo de análises teve erros"
          python manage.py export_public_data --days-ahead 3 --include-per-match || echo "⚠️ Export público (JSON) teve erros"

      - name: Commit public data snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data
          git diff --staged --quiet || git commit -m "data: atualizar snapshots públicos"
          git push
